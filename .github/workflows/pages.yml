name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If you have a build step (npm/hugo/eleventy), add it here.
      # Example for static HTML-only repo: no build step required.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./   # publish root; change to ./docs or ./dist if your site lives there

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1